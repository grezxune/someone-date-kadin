<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OG Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600..700;1,9..144,500&family=Instrument+Sans:wght@500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #f6f1e4;
    --green: #123b2a;
    --green-2: #0c2b1e;
    --gold: #b8923d;
    --gold-2: #d8b563;
    --rust: #c4552d;
    --ink: #211f1a;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--cream);
    font-family: "Instrument Sans", sans-serif;
  }
  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
  }
  .rings {
    position: absolute;
    right: -220px;
    top: -230px;
    width: 820px;
    height: 820px;
    border-radius: 50%;
    background: repeating-radial-gradient(circle at center, transparent 0 62px, rgba(18,59,42,0.10) 62px 64px);
  }
  .content {
    position: absolute;
    left: 72px;
    top: 0;
    bottom: 0;
    width: 610px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .eyebrow {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 22px;
  }
  h1 {
    font-family: "Fraunces", serif;
    font-weight: 700;
    font-size: 76px;
    line-height: 1.02;
    letter-spacing: -0.01em;
    color: var(--green-2);
  }
  h1 .swash {
    font-style: italic;
    font-weight: 500;
    color: var(--gold);
  }
  h1 .normal {
    font-size: 56px;
    font-weight: 600;
  }
  .sub {
    margin-top: 26px;
    font-size: 24px;
    line-height: 1.5;
    color: #4c4a40;
    max-width: 540px;
  }
  .sub strong { color: var(--ink); }
  .badge-pill {
    margin-top: 32px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: fit-content;
    background: var(--green-2);
    color: var(--gold-2);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 999px;
  }
  .site {
    margin-top: 22px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 20px;
    font-weight: 700;
    color: var(--green-2);
  }
  .site .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--rust);
  }
  .photo-wrap {
    position: absolute;
    right: 56px;
    top: 50%;
    transform: translateY(-50%) rotate(2.5deg);
    width: 400px;
    background: #fdfbf5;
    padding: 16px 16px 22px;
    border-radius: 4px;
    box-shadow: 0 4px 10px rgba(18,26,18,0.18), 0 26px 60px rgba(18,26,18,0.32);
  }
  .photo-wrap img {
    display: block;
    width: 100%;
    height: 460px;
    object-fit: cover;
    border-radius: 2px;
  }
  .photo-cap {
    font-family: "Caveat", cursive;
    font-size: 28px;
    text-align: center;
    color: #4c4a40;
    padding-top: 14px;
  }
  .tape {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%) rotate(-1.5deg);
    width: 110px;
    height: 26px;
    background: rgba(216,181,99,0.55);
  }

</style>
</head>
<body>
  <div class="canvas">
    <div class="rings"></div>
    <div class="content">
      <div class="eyebrow">A public service announcement</div>
      <h1>Someone <span class="normal">(normal)</span>,<br /><span class="swash">please,</span> date<br />Kadin.</h1>
      <p class="sub"><strong>Kadin Hayakawa</strong>: golfer, pool shark, genuinely great musician. Inexplicably single.</p>
      <div class="badge-pill">⛳ Certified Single · Swing Included</div>
      <div class="site"><span class="dot"></span>someonedatekadin.com</div>
    </div>
    <div class="photo-wrap">
      <div class="tape"></div>
      <img src="../images/kadin-hero.jpg" alt="" />
      <div class="photo-cap">The bachelor in question.</div>
    </div>
  </div>
</body>
</html>
